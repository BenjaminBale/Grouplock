<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment confirmed · Grouple</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:white;border-radius:14px;padding:32px;max-width:440px;width:100%;text-align:center;border:1px solid #ddd}
.icon{width:64px;height:64px;background:#e0f5ec;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px;color:#1D9E75}
h2{font-size:20px;margin-bottom:8px;color:#111}
p{font-size:13px;color:#666;line-height:1.6;margin-bottom:8px}
.amount{font-size:28px;font-weight:700;color:#0d6e52;margin:12px 0;}
.detail{font-size:12px;color:#888;margin-bottom:20px;}
.btn{display:inline-block;background:#1D9E75;color:white;padding:12px 28px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;margin-top:8px;}
.btn:hover{background:#178a65}
.loading{font-size:12px;color:#aaa;margin-top:12px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h2>Payment confirmed!</h2>
  <p>Your share has been paid and is held securely by Grouple.</p>
  <div class="amount" id="amount-display"></div>
  <div class="detail" id="detail-display">Booking confirms automatically once everyone pays.</div>
  <p style="font-size:12px;color:#888;margin-bottom:16px;">If the group doesn't fill, your payment is refunded automatically.</p>
  <a id="back-btn" href="/" class="btn">View group dashboard →</a>
  <div class="loading" id="loading-msg">Confirming your payment...</div>
</div>

<script>
const p = new URLSearchParams(window.location.search);
const bookingId = p.get('booking');
const memberId = p.get('member');

async function confirmPayment() {
  if (!bookingId || !memberId) return;
  try {
    const res = await fetch('/api/booking/' + bookingId + '/confirm/' + memberId);
    const data = await res.json();

    document.getElementById('loading-msg').textContent = '';

    if (data.paidCount !== undefined) {
      document.getElementById('amount-display').textContent = '';
      document.getElementById('detail-display').textContent =
        data.paidCount + ' of ' + data.groupSize + ' people have now paid.';

      if (data.status === 'complete') {
        document.getElementById('detail-display').textContent = 'All ' + data.groupSize + ' people paid — booking confirmed!';
        document.getElementById('detail-display').style.color = '#1D9E75';
      }
    }

    // Set back button to return to the right booking
    document.getElementById('back-btn').href = '/?booking=' + bookingId;

  } catch(err) {
    document.getElementById('loading-msg').textContent = 'Could not confirm — please go back to the dashboard.';
  }
}

confirmPayment();
</script>
</body>
</html>
