<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grouple · Pay your share</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:14px;max-width:480px;width:100%;overflow:hidden;border:1px solid #e0e0e0;}
.header{background:#1D9E75;padding:20px 24px;color:white;}
.header h2{font-size:16px;margin-bottom:4px;}
.header p{font-size:12px;opacity:.85;}
.body{padding:22px 24px;text-align:center;}
.share-box{background:#f0faf6;border:1px solid #9fe1cb;border-radius:8px;padding:16px;margin-bottom:16px;}
.share-amount{font-size:32px;font-weight:700;color:#0d6e52;margin:4px 0;}
.share-label,.share-sub{font-size:11px;color:#0f6e56;}
.spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{font-size:14px;color:#666;margin:20px 0;}
.error{color:#c0392b;font-size:13px;margin-top:12px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="header"><h2>Pay your share</h2><p>Secure group payment · Powered by Grouple</p></div>
  <div class="body">
    <div class="share-box">
      <div class="share-label">Your share</div>
      <div class="share-amount" id="amount">Loading...</div>
      <div class="share-sub">Held securely · refunded if group doesn't fill</div>
    </div>
    <div class="spinner"></div>
    <div class="loading">Redirecting to secure payment...</div>
    <div class="error" id="error"></div>
  </div>
</div>
<script>
const p=new URLSearchParams(window.location.search);
const bookingId=p.get('booking');
const memberId=p.get('member');
async function init(){
  if(!bookingId||!memberId){showError('Invalid invite link.');return;}
  try{
    const s=await fetch('/api/booking/'+bookingId);
    const sd=await s.json();
    if(sd.shareAmount)document.getElementById('amount').textContent='£'+sd.shareAmount;
    const res=await fetch('/api/booking/'+bookingId+'/checkout/'+memberId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    window.location.href=data.url;
  }catch(err){showError('Error: '+err.message);}
}
function showError(msg){
  document.querySelector('.spinner').style.display='none';
  document.querySelector('.loading').style.display='none';
  const e=document.getElementById('error');
  e.textContent=msg;e.style.display='block';
}
init();
</script>
</body>
</html>
